<!DOCTYPE html>
<html>
<head>
    <title>SignalMapper Pro | Lane Guidance</title>
    <style>
        body { background: #010409; color: white; font-family: sans-serif; margin: 0; }
        #hud { position: fixed; bottom: 0; width: 100%; height: 80px; background: #0d1117; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #30363d; }
        #lane-overlay { display: none; position: absolute; top: 10%; left: 50%; transform: translateX(-50%); background: rgba(28, 33, 40, 0.95); padding: 30px; border: 2px solid #58a6ff; border-radius: 15px; text-align: center; min-width: 400px; }
        .lanes { font-size: 3em; font-family: monospace; letter-spacing: 10px; color: #58a6ff; }
    </style>
</head>
<body>
    <div id="lane-overlay">
        <div id="lane-visual" class="lanes"></div>
        <div id="lane-text" style="font-size: 1.5em; margin-top: 20px;"></div>
    </div>
    <div id="hud">
        <div>BER: <span id="ber">--</span></div>
        <div>POS: <span id="pos">--</span></div>
    </div>
    <script>
        function update() {
            fetch('/api/telemetry').then(r => r.json()).then(data => {
                document.getElementById('ber').innerText = data.rf.ber;
                document.getElementById('pos').innerText = data.pos.lat + ", " + data.pos.lon;
                
                const overlay = document.getElementById('lane-overlay');
                if (data.guidance) {
                    overlay.style.display = 'block';
                    document.getElementById('lane-visual').innerText = data.guidance.lanes;
                    document.getElementById('lane-text').innerText = data.guidance.msg;
                } else {
                    overlay.style.display = 'none';
                }
            });
        }
        setInterval(update, 2000);
    </script>
</body>
</html>
