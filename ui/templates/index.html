<!DOCTYPE html>
<html>
<head>
    <title>SignalMapper Pro | Mission Control</title>
    <style>
        body { background: #010409; color: #c9d1d9; font-family: sans-serif; margin: 0; overflow: hidden; }
        #mission-panel { position: absolute; top: 20px; left: 20px; background: #0d1117; padding: 15px; border: 1px solid #30363d; border-radius: 6px; z-index: 5000; }
        #lane-overlay { display: none; position: absolute; top: 15%; left: 50%; transform: translateX(-50%); background: #161b22; padding: 40px; border: 2px solid #58a6ff; border-radius: 12px; text-align: center; box-shadow: 0 0 20px rgba(88,166,255,0.4); z-index: 4000; }
        .lanes { font-size: 4em; font-family: monospace; color: #58a6ff; margin-bottom: 10px; }
        #hud { position: fixed; bottom: 0; width: 100%; height: 60px; background: #0d1117; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #30363d; }
        select, button { background: #21262d; color: white; border: 1px solid #30363d; padding: 5px; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="mission-panel">
        <select id="purpose">
            <option value="biz">Business - RF Audit</option>
            <option value="personal">Personal - Nav Only</option>
        </select>
        <button onclick="console.log('Mission Configured')">Lock Mission</button>
    </div>

    <div id="lane-overlay">
        <div id="lane-visual" class="lanes"></div>
        <div id="lane-text" style="font-size: 1.8em; font-weight: bold;"></div>
    </div>

    <div id="hud">
        <div>📡 GNSS: <span id="gnss-status">--</span></div>
        <div>📶 BER: <span id="ber">--</span></div>
        <div>📍 <span id="pos">--</span></div>
    </div>

    <script>
        function update() {
            fetch('/api/telemetry').then(r => r.json()).then(data => {
                document.getElementById('ber').innerText = data.rf.ber;
                document.getElementById('pos').innerText = data.pos.lat.toFixed(4) + ", " + data.pos.lon.toFixed(4);
                
                const overlay = document.getElementById('lane-overlay');
                if (data.guidance) {
                    overlay.style.display = 'block';
                    document.getElementById('lane-visual').innerText = data.guidance.lanes;
                    document.getElementById('lane-text').innerText = data.guidance.msg;
                } else {
                    overlay.style.display = 'none';
                }
            });
        }
        setInterval(update, 2000);
    </script>
</body>
</html>
